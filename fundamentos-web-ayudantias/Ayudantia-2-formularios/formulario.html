<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form action="#" method="POST">
        <div>
            <label for="nombre">NOMBRE: </label>
            <input type="text" id="nombre" name="nombre">
        </div>

        <br>

        <div>
            <label for="calendario">Ingrese una fecha:</label>
            <input type="date" name="calendario" id="calendario">
        </div>
        <br>
        <div>
            <p>Elegir pokemon:</p>
            <input type="radio" id="bulbasaur" name="genero" value="bulbasaur" />
            <label for="bulbasaur">Bulbasaur</label>
            <br>
            <input type="radio" id="squirtle" name="genero" value="squirtle" />
            <label for="squirtle">Squirtle</label>
            <br>
            <input type="radio" id="charmander" name="genero" value="charmander">
            <label for="charmander">Charmander</label>

        </div>
    </form>
</body>
</html>
